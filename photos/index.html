<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dipak · Photos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #f0ece4;
    --text-muted: #888;
    --accent: #c9a96e;
    --accent-soft: rgba(201,169,110,0.12);
    --radius: 16px;
    --gap: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .photo-count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .photo-count strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    padding: 64px 32px 48px;
  }

  .hero-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 100px;
    padding: 5px 14px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero p {
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 300;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── Gallery ── */
  .gallery-wrap {
    padding: 0 24px 80px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .masonry {
    columns: 4;
    column-gap: var(--gap);
  }

  @media (max-width: 1100px) { .masonry { columns: 3; } }
  @media (max-width: 700px)  { .masonry { columns: 2; } }
  @media (max-width: 400px)  { .masonry { columns: 1; } }

  .photo-card {
    break-inside: avoid;
    margin-bottom: var(--gap);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--surface);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .photo-card img {
    width: 100%;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .photo-card:hover img { transform: scale(1.04); }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }

  .photo-card:hover .photo-overlay { opacity: 1; }

  .photo-name {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .lightbox.open { display: flex; }

  .lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 12px;
    object-fit: contain;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: zoomIn 0.25s ease;
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lightbox-close {
    position: fixed;
    top: 20px;
    right: 24px;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .lightbox-nav:hover { background: rgba(255,255,255,0.15); }
  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }

  /* ── States ── */
  .state-box {
    text-align: center;
    padding: 80px 32px;
  }

  .state-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .state-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin-bottom: 10px;
    color: var(--text);
  }

  .state-msg {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 380px;
    margin: 0 auto 24px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(201,169,110,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── How to add ── */
  .howto {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px 32px;
    max-width: 600px;
    margin: 0 auto 60px;
    text-align: left;
  }

  .howto h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    margin-bottom: 14px;
    color: var(--accent);
  }

  .howto ol {
    padding-left: 18px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 2;
  }

  .howto code {
    background: var(--surface2);
    color: var(--accent);
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 12px;
    font-family: monospace;
  }

  footer {
    text-align: center;
    padding: 32px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Dipak <span>· Photos</span></div>
  <div class="header-right">
    <span class="photo-count" id="count-display">Loading...</span>
  </div>
</header>

<div class="hero">
  <div class="hero-tag">Personal Gallery</div>
  <h1>My <em>Moments</em><br>& Memories</h1>
  <p>A collection of photos from life's beautiful chapters.</p>
</div>

<div class="gallery-wrap">
  <div id="gallery-state" class="state-box">
    <div class="spinner"></div>
    <div class="state-title">Loading photos...</div>
    <div class="state-msg">Fetching your gallery from GitHub</div>
  </div>
  <div class="masonry" id="masonry"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="changePhoto(-1)">‹</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt=""/>
  <button class="lightbox-nav lightbox-next" onclick="changePhoto(1)">›</button>
</div>

<footer>
  Built with ♥ by <a href="https://github.com/Dipak491" target="_blank">Dipak Narkhede</a>
  &nbsp;·&nbsp; Add photos to <code>photos/</code> folder &amp; push to GitHub
</footer>

<script>
  // ── CONFIG — update these ──
  const GITHUB_USER = 'Dipak491';
  const GITHUB_REPO = 'photos';        // your new repo name
  const PHOTOS_FOLDER = 'photos';      // folder inside repo
  const BRANCH = 'main';
  // ────────────────────────────

  const IMAGE_EXTS = ['jpg','jpeg','png','gif','webp','avif','JPG','JPEG','PNG'];
  let allPhotos = [];
  let currentIndex = 0;

  async function loadGallery() {
    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${PHOTOS_FOLDER}?ref=${BRANCH}`;
    try {
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
      const files = await res.json();

      allPhotos = files.filter(f =>
        f.type === 'file' && IMAGE_EXTS.some(ext => f.name.endsWith(ext))
      );

      if (allPhotos.length === 0) {
        showEmpty();
        return;
      }

      renderGallery(allPhotos);
      document.getElementById('count-display').innerHTML =
        `<strong>${allPhotos.length}</strong> photos`;

    } catch (err) {
      showError(err.message);
    }
  }

  function renderGallery(photos) {
    const state = document.getElementById('gallery-state');
    const masonry = document.getElementById('masonry');
    state.style.display = 'none';
    masonry.innerHTML = '';

    photos.forEach((photo, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.style.animationDelay = `${i * 0.05}s`;

      const imgUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${PHOTOS_FOLDER}/${photo.name}`;
      const name = photo.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');

      card.innerHTML = `
        <img src="${imgUrl}" alt="${name}" loading="lazy"/>
        <div class="photo-overlay">
          <span class="photo-name">${name}</span>
        </div>
      `;

      card.addEventListener('click', () => openLightbox(i));
      masonry.appendChild(card);
    });
  }

  function showEmpty() {
    document.getElementById('gallery-state').innerHTML = `
      <div class="state-icon">📷</div>
      <div class="state-title">No photos yet</div>
      <div class="state-msg">Add your photos to the <strong>photos/</strong> folder in your GitHub repo and push — they'll appear here automatically!</div>
      <div class="howto">
        <h3>How to add photos</h3>
        <ol>
          <li>Create a folder called <code>photos/</code> in your repo</li>
          <li>Drop your images inside it</li>
          <li>Run <code>git add .</code> then <code>git commit -m "Add photos"</code></li>
          <li>Run <code>git push</code> — done! 🎉</li>
        </ol>
      </div>
    `;
    document.getElementById('count-display').textContent = '0 photos';
  }

  function showError(msg) {
    document.getElementById('gallery-state').innerHTML = `
      <div class="state-icon">⚠️</div>
      <div class="state-title">Could not load photos</div>
      <div class="state-msg">Make sure the repo is public and the <code>photos/</code> folder exists.<br/><small style="opacity:0.5">${msg}</small></div>
    `;
    document.getElementById('count-display').textContent = 'Error';
  }

  // ── Lightbox ──
  function openLightbox(index) {
    currentIndex = index;
    updateLightboxImg();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function changePhoto(dir) {
    currentIndex = (currentIndex + dir + allPhotos.length) % allPhotos.length;
    updateLightboxImg();
  }

  function updateLightboxImg() {
    const photo = allPhotos[currentIndex];
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${PHOTOS_FOLDER}/${photo.name}`;
    document.getElementById('lightbox-img').src = url;
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') changePhoto(1);
    if (e.key === 'ArrowLeft') changePhoto(-1);
  });

  loadGallery();
</script>
</body>
</html>
